[build]
command = 'npm run build'
publish = '_site'
functions = 'functions'

[build.environment]
NODE_VERSION = '18'

[[headers]]
for = '/*'
[headers.values]
X-Frame-Options = 'DENY'
X-XSS-Protection = '1; mode=block'
X-Content-Type-Options = 'nosniff'
Referrer-Policy = 'strict-origin-when-cross-origin'
Permissions-Policy = 'camera=(), microphone=(), geolocation=()'
Content-Security-Policy = 'default-src self; script-src self; style-src self unsafe-inline; img-src self https: data: blob:; font-src self https: data:; connect-src self https:; frame-ancestors none; base-uri self; form-action self;'

[[headers]]
for = '*.css'
[headers.values]
Cache-Control = 'public, max-age=31536000, immutable'

[[headers]]
for = '*.js'
[headers.values]
Cache-Control = 'public, max-age=31536000, immutable'

[[headers]]
for = '/.netlify/functions/*'
[headers.values]
Cache-Control = 'public, max-age=60'

[functions]
node_bundler = 'esbuild'

[[redirects]]
from = '/api/search'
to = '/.netlify/functions/search'
status = 200

[[redirects]]
from = '/api/telegram'
to = '/.netlify/functions/telegram'
status = 200
